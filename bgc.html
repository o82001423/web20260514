<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-color</title>
</head>
<style>
    .box{
        width: 400px;
        height: 280px;
        background-color: rgb(44, 182, 201);
    }
    .box1{
        width: 700px; 
        height: 700px;
        background-color: lightgray;
    }
    .box2{
        background-image:url('https://memes.tw/wtf?template=2879');
        background-color: lightcoral;
        background-repeat:no-repeat;
        background-position: right bottom;
    }

</style>
<body>
    <h3>div</h3>
    <div class="box">
        <img src="./pikachu-pokemon.gif" alt="">
    </div>
    <hr>
    <h3>div bg img</h3>
    <div class="box box1">
        <img src="./pikachu-pokemon.gif" alt="">
    </div>
    <hr>
    <h3>img</h3>
    <div class="box box2">
        <img src=".//pikachu-pokemon.gif" alt="">

    </div>

</body>
</html>
