<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>航海王懸賞牆 - 小白也能懂版</title>
    <style>
        /* 1. 牆壁層：貼上背景地圖 */
        body {
            margin: 0;
            padding: 0;
            background-image: url('./123.jpg'); /* 這裡換成你的背景地圖 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* 2. 玻璃層：80% 透明的毛玻璃 */
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 0.2 代表 20% 不透明，所以有 80% 的透明感 */
            background: rgba(255, 255, 255, 0.2); 
            /* 這行讓背景變朦朧 */
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 0; /* 在最下面 */
        }

        /* 3. 格子容器：把 6 張照片裝進去 */
        .container {
            position: relative;
            z-index: 1; /* 確保在玻璃上面 */
            display: grid;
            /* 核心：分成 3 欄，每欄寬 270 像素 */
            grid-template-columns: repeat(3, 270px);
            grid-gap: 50px; /* 照片之間的走道寬度 */
            padding: 80px 20px;
        }

        /* 4. 照片層：設定圖片與暗影 */
        .poster {
            width: 270px;
            height: 390px;
            background-image: url('./one.png'); /* 這裡換成你的懸賞單大圖 */
            background-repeat: no-repeat;
            border-radius: 5px;
            /* 暗影：讓照片「浮」起來 */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7); 
            /* 動畫：讓變大變小的過程順滑 */
            transition: all 0.4s ease;
        }

        /* 5. 魔法：滑鼠摸到會變大飛起 */
        .poster:hover {
            transform: translateY(-20px) scale(1.05); /* 向上飛 20px 並放大 1.05 倍 */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); /* 影子變大，更有高度感 */
            cursor: pointer;
        }

        /* 6. 剪裁：調整大圖的位置（根據你的數值） */
        .box  { background-position: -25px -14px; }    /* 魯夫 */
        .box2 { background-position: -357px -14px; }   /* 香吉士 */
        .box3 { background-position: -687px -13px; }   /* 佛朗基 */
        .box1 { background-position: -25px -433px; }   /* 甚平 */
        .box4 { background-position: -355px -434px; }  /* 薩波 */
        .box5 { background-position: -687px -433px; }  /* 紅髮 */

    </style>
</head>
<body>

    <!-- 這是那層毛玻璃 -->
    <div class="glass-overlay"></div>

    <!-- 這是裝 6 張懸賞單的大櫃子 -->
    <div class="container">
        <div class="poster box"></div>
        <div class="poster box2"></div>
        <div class="poster box3"></div>
        <div class="poster box1"></div>
        <div class="poster box4"></div>
        <div class="poster box5"></div>
    </div>

</body>
</html>
